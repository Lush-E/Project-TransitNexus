<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TransitNexus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <p class="brand-kicker">RAIL OPERATION CONSOLE</p>
        <h1>TransitNexus</h1>
      </div>
      <div class="controls">
        <div class="control-block mode-switch" aria-label="Mode">
          <span>Mode</span>
          <div class="mode-buttons" role="group" aria-label="Mode Buttons">
            <button id="modeSelectBtn" class="action-btn mode-btn" type="button" title="Select">
              <span class="mode-icon">&#x2196;</span>
              <span>Select</span>
            </button>
            <button id="modeTrackBtn" class="action-btn mode-btn" type="button" title="Track">
              <span class="mode-icon">&#x2550;</span>
              <span>Track</span>
            </button>
            <button id="modeEraseBtn" class="action-btn mode-btn" type="button" title="Erase">
              <span class="mode-icon">&#x232B;</span>
              <span>Erase</span>
            </button>
          </div>
        </div>
        <button id="undoBtn" class="action-btn ghost">Undo</button>
        <button id="redoBtn" class="action-btn ghost">Redo</button>
        <button id="deleteSelectedBtn" class="action-btn ghost">Delete Selected</button>
        <button id="playBtn" class="action-btn">Play</button>
        <label class="control-block speed-block">
          <span>Speed</span>
          <input id="speedRange" type="range" min="1" max="30" value="8" />
          <span id="speedLabel">x8</span>
        </label>
        <label class="control-block radius-block">
          <span>Track Preset</span>
          <select id="trackPresetSelect">
            <option value="ballast_main">Ballast Mainline</option>
            <option value="slab_urban">Slab Urban</option>
            <option value="yard_light">Yard Light</option>
          </select>
        </label>
        <label class="control-block radius-block">
          <span>Render</span>
          <select id="renderModeSelect">
            <option value="cad" selected>CAD</option>
            <option value="realistic">Realistic</option>
          </select>
        </label>
        <div class="control-block zoom-block" aria-label="Zoom Controls">
          <span>View Scale</span>
          <div class="zoom-controls" role="group" aria-label="Zoom Buttons">
            <button id="zoomOutBtn" class="action-btn ghost" type="button" title="Show Wider Area">Wide</button>
            <span id="zoomLabel">1.0x</span>
            <button id="zoomInBtn" class="action-btn ghost" type="button" title="Show More Detail">Detail</button>
          </div>
        </div>
        <button id="resetBtn" class="action-btn ghost">Reset Time</button>
      </div>
    </header>

    <main class="layout">
      <section class="canvas-panel">
        <div class="panel-header">
          <h2>Network Map</h2>
          <span class="signal-dot"></span>
        </div>
        <section id="selectFilterMenu" class="select-filter-menu" aria-label="Selection Targets">
          <h3>Selection Targets</h3>
          <label><input id="filterStation" type="checkbox" checked /> Station</label>
          <label><input id="filterSignal" type="checkbox" /> Signal</label>
          <label><input id="filterObject" type="checkbox" /> Object</label>
          <label><input id="filterTrain" type="checkbox" checked /> Train</label>
        </section>
        <section id="layerMenu" class="select-filter-menu layer-menu" aria-label="Display Layers">
          <h3>Layers</h3>
          <label><input id="layerGrid" type="checkbox" checked /> Grid</label>
          <label><input id="layerTrack" type="checkbox" checked /> Track</label>
          <label><input id="layerVehicleGuide" type="checkbox" checked /> Vehicle Width Guide (3000mm fixed)</label>
          <label><input id="layerStations" type="checkbox" checked /> Stations</label>
          <label><input id="layerTrains" type="checkbox" checked /> Trains</label>
          <label><input id="layerWarnings" type="checkbox" checked /> Warnings</label>
        </section>
        <canvas id="mapCanvas" width="980" height="620"></canvas>
        <div class="hint" id="hintText"></div>
      </section>

      <aside class="side-panel">
        <section class="widget">
          <h2>Stations</h2>
          <ul id="stationList"></ul>
        </section>

        <section class="widget">
          <h2>Create Train</h2>
          <form id="trainForm">
            <label>
              <span>Name</span>
              <input id="trainName" type="text" value="T001" required />
            </label>
            <label>
              <span>Stops (station@hh:mm, comma separated)</span>
              <textarea id="trainStops" rows="5" placeholder="S1@06:00, S2@06:03, S3@06:07"></textarea>
            </label>
            <button type="submit" class="action-btn">Add Train</button>
          </form>
          <ul id="trainList"></ul>
        </section>
      </aside>
    </main>

    <script src="./main.js"></script>
  </body>
</html>
