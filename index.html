<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rail Draft Prototype</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <section id="titleScreen" class="title-screen" aria-label="Title Menu">
      <div class="title-card">
        <h2>TransitNexus</h2>
        <p class="title-sub">Rail Diagram Sandbox</p>
        <div id="titleMainMenu" class="title-menu">
          <button id="titleNewGameBtn" class="title-btn">New Game</button>
          <button id="titleLoadGameBtn" class="title-btn">セーブデータを選択</button>
          <button id="titleContinueBtn" class="title-btn">前回の続き</button>
          <button id="titleExitBtn" class="title-btn danger">Exit</button>
        </div>
        <p id="titleInfo" class="title-info"></p>
      </div>
    </section>

    <header class="toolbar">
      <div class="toolbar-head">
        <div class="brand">
          <h1>配線略図エディタ</h1>
          <p class="subhead">TransitNexus prototype</p>
        </div>
        <div class="head-right">
          <nav class="head-links" aria-label="Header Actions">
            <button type="button" class="link-like">Language</button>
            <button type="button" class="link-like">お知らせ</button>
            <button type="button" class="link-like">ログイン</button>
          </nav>
          <div class="status-chips">
            <span id="zoomStat" class="chip">500%</span>
            <span id="countStat" class="chip">T0 P0 R0</span>
            <span id="saveNotice" class="chip">QSV: -</span>
          </div>
        </div>
      </div>

      <div class="tools">
        <button data-mode="select" class="tool" title="選択">選択</button>
        <button data-mode="track" class="tool active" title="線路">線路</button>
        <button data-mode="platform" class="tool" title="プラットホーム">ホーム</button>
        <button data-mode="viaduct" class="tool" title="高架">高架</button>
        <button data-mode="train" class="tool" title="列車">列車</button>
        <button data-mode="car" class="tool" title="車両追加">増結</button>
        <button data-mode="erase" class="tool" title="削除">削除</button>
        <span class="tool-sep" aria-hidden="true"></span>
        <button id="layerMenuBtn" class="tool" title="表示レイヤー">レイヤー</button>
        <button id="quickSaveBtn" class="tool" title="クイック保存">QSV</button>
        <button id="saveBtn" class="tool" title="ファイル保存">保存</button>
        <button id="loadBtn" class="tool" title="ファイル読込">読込</button>
        <button id="clearBtn" class="tool ghost" title="全削除">全削除</button>
      </div>

      <section id="layerPanel" class="layer-panel" aria-label="Display Layers" hidden>
        <label><input id="layerGrid" type="checkbox" checked /> Grid</label>
        <label><input id="layerTrack" type="checkbox" checked /> Track</label>
        <label><input id="layerClearance" type="checkbox" checked /> Clearance</label>
        <label><input id="layerPlatform" type="checkbox" checked /> Platform</label>
        <label><input id="layerTrain" type="checkbox" checked /> Train</label>
      </section>

      <p id="hint">線路: 始点クリック → 終点クリックで敷設</p>
      <section class="mode-guide" aria-label="操作ガイド">
        <p id="modeLabel" class="mode-label">現在モード: 線路</p>
        <div id="viaductEditSwitch" class="viaduct-edit-switch" hidden>
          <span>高架編集:</span>
          <button id="viaductWallEditBtn" type="button" class="tool mini">外側線</button>
          <button id="viaductAreaEditBtn" type="button" class="tool mini">高架エリア</button>
        </div>
        <ul id="modeSteps" class="mode-steps"></ul>
      </section>

      <section class="track-settings" aria-label="Track Laying Settings">
        <label>
          Grid Pitch
          <select id="gridSizeSelect">
            <option value="1" selected>1 cell</option>
            <option value="2">2 cells</option>
            <option value="5">5 cells</option>
          </select>
        </label>
        <label class="inline-check">
          <input id="snapToggle" type="checkbox" checked />
          Snap
        </label>
        <label class="inline-check">
          <input id="orthoToggle" type="checkbox" />
          Ortho
        </label>
        <label>
          Track Width
          <input id="trackWidthRange" type="range" min="1" max="8" step="1" value="2" />
          <span id="trackWidthLabel">2u</span>
        </label>
        <label>
          Level
          <input id="trackLevelInput" type="number" min="-4" max="4" step="1" value="0" />
        </label>
        <div class="level-stepper" aria-label="Level Controls">
          <button id="levelDownBtn" type="button" class="level-btn" title="PageDown">▽</button>
          <span id="levelIndicator" class="level-indicator">Lv 0 (0基準)</span>
          <button id="levelUpBtn" type="button" class="level-btn" title="PageUp">△</button>
        </div>
        <label>
          Gradient
          <select id="trackGradientSelect">
            <option value="-2">Down -2</option>
            <option value="-1">Down -1</option>
            <option value="0" selected>Flat 0</option>
            <option value="1">Up +1</option>
            <option value="2">Up +2</option>
          </select>
        </label>
        <label>
          Line Type
          <select id="trackLineTypeSelect">
            <option value="solid" selected>Solid</option>
            <option value="dashed">Dashed</option>
            <option value="dotted">Dotted</option>
          </select>
        </label>
        <div class="line-color-setting">
          <span>Line Color</span>
          <div class="line-color-row">
            <input id="trackColorInput" type="color" value="#25698a" />
            <button id="toggleLineColorPanelBtn" type="button" class="tool mini ghost">Color</button>
          </div>
        </div>
        <label>
          Min Length
          <input id="minTrackLenRange" type="range" min="1" max="20" step="0.5" value="1" />
          <span id="minTrackLenLabel">1.0u</span>
        </label>
        <label data-setting-group="viaduct-wall">
          Viaduct Span
          <input id="viaductSpanRange" type="range" min="4" max="80" step="1" value="24" />
          <span id="viaductSpanLabel">24u</span>
        </label>
        <label data-setting-group="viaduct-wall">
          外側線操作
          <span id="viaductWallActionButtons" class="mode-toggle" role="group" aria-label="外側線操作">
            <button id="viaductWallActionDrawBtn" type="button" class="tool mini active">追加</button>
            <button id="viaductWallActionEraseBtn" type="button" class="tool mini">削除</button>
          </span>
        </label>
        <label data-setting-group="viaduct-area">
          Viaduct Area
          <span id="viaductAreaModeButtons" class="mode-toggle" role="group" aria-label="高架エリア操作">
            <button id="viaductAreaModePaintBtn" type="button" class="tool mini active">追加</button>
            <button id="viaductAreaModeEraseBtn" type="button" class="tool mini">削除</button>
          </span>
        </label>
        <label data-setting-group="viaduct-area">
          VAT Shape
          <select id="viaductAreaShapeSelect">
            <option value="poly" selected>Polygon</option>
          </select>
        </label>
      </section>
    </header>

    <main class="stage-wrap">
      <canvas id="stage" width="1400" height="760"></canvas>
    </main>

    <section id="lineColorPanel" class="line-color-window" hidden>
      <div id="lineColorPanelHandle" class="line-color-window-handle">Color Presets</div>
      <div id="savedLineColorActions" class="saved-line-color-actions">
        <button id="saveLineColorBtn" type="button" class="tool mini ghost">Save</button>
        <button id="renameLineColorBtn" type="button" class="tool mini ghost">Rename</button>
        <button id="deleteLineColorBtn" type="button" class="tool mini ghost">Delete</button>
      </div>
      <div id="renameLineColorEditor" class="rename-line-color-editor" hidden>
        <input id="renameLineColorInput" type="text" maxlength="24" placeholder="新しい名前" />
        <button id="renameLineColorSaveBtn" type="button" class="tool mini">Save</button>
        <button id="renameLineColorCancelBtn" type="button" class="tool mini ghost">Cancel</button>
      </div>
      <div id="savedLineColorList" class="saved-line-color-list" hidden></div>
    </section>

    <input id="loadFileInput" type="file" accept="application/json,.json" hidden />

    <script src="./app.js"></script>
  </body>
</html>
